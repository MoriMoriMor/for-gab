<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>for gab 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0; padding:0; height:100%; overflow:hidden;
  font-family:'Quicksand',sans-serif;
  transition:background 1s ease;
}

#container{
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:85%; text-align:center; z-index:2;
}

#text{
  font-size:34px; line-height:1.4;
  color:#222; opacity:0.85; transition:opacity .8s ease;
  position:relative;
}

.fade-in{opacity:1;}
.fade-out{opacity:0;}

.word{
  opacity:0; display:inline-block;
  transition: opacity 0.5s ease, transform 0.5s ease;
  transform: translateY(10px); margin-right:5px;
}
.word.show{opacity:1; transform: translateY(0);}

/* STAR + MUSIC + BUGS */
.star,.note,.bee,.butterfly{
  position:absolute; pointer-events:none; animation:floatUp 4s linear forwards; z-index:1;
}
.star{font-size:28px;}
.note{font-size:32px;}
.bee,.butterfly{font-size:27px;}
@keyframes floatUp{
  0%{opacity:0; transform:translateY(20px) scale(.6)}
  40%{opacity:1;}
  100%{opacity:0; transform:translateY(-120px) scale(1)}
}

/* FLOWER */
.flower{
  position:absolute; pointer-events:none;
  animation:bloom .7s ease-out forwards; z-index:2;
}
@keyframes bloom{
  0%{transform:scale(0) rotate(-40deg); opacity:0}
  60%{opacity:1}
  100%{transform:scale(1) rotate(10deg); opacity:1}
}
</style>
</head>

<body>
<div id="container"><div id="text"></div></div>

<script>
const slides=[
  {text:"hi gab",bg:"linear-gradient(135deg,#FFF6A8,#FFFBD6)",color:"#333",effect:"words",emoji:"bugs"},
  {text:"i hope you are happy, always",bg:"linear-gradient(135deg,#F9C6D3,#FFDDE6)",color:"#222",effect:"words",emoji:"stars"},
  {text:"i want you to know",bg:"linear-gradient(135deg,#BDE7FF,#E6F6FF)",color:"#222",effect:"words",emoji:"stars"},
  {text:"You’re my favorite song, playing endlessly in my thought",bg:"linear-gradient(135deg,#E6C8FF,#F2E6FF)",color:"#222",effect:"words",emoji:"notes"},
  {text:"i hope i can hand you this flower myself :)",bg:"linear-gradient(135deg,#CFF5D2,#E9FFE9)",color:"#222",effect:"words",emoji:"flowers"}
];

let slideIndex=0, starInterval, noteInterval, bugInterval, flowers=[];
const text=document.getElementById("text");

function showSlide(i){
  if(i>=slides.length) return;
  const s = slides[i];
  document.body.style.background = s.bg;
  text.style.color = s.color;
  text.className="fade-out";
  text.innerHTML="";

  clearInterval(starInterval); clearInterval(noteInterval); clearInterval(bugInterval);

  setTimeout(()=>{
    // kata per kata
    const words = s.text.split(" ");
    const totalWords = words.length;
    const delayPerWord = Math.max(40, 600/totalWords);

    words.forEach((word, idx)=>{
      const span = document.createElement("span");
      span.className="word"; span.textContent = word;
      text.appendChild(span);
      setTimeout(()=>span.classList.add("show"), idx*delayPerWord);
    });
    text.className="fade-in";

    // emoji sesuai tahap
    if(s.emoji==="stars") startStars();
    else if(s.emoji==="notes") startNotes();
    else if(s.emoji==="bugs") startBugs();
    else if(s.emoji==="flowers") flowerBurst();

  },600);
}

/* emoji functions */
function startStars(){
  starInterval=setInterval(()=>{
    const star=document.createElement("div"); star.className="star"; star.innerHTML="⭐";
    star.style.left=Math.random()*window.innerWidth+"px"; star.style.top=Math.random()*window.innerHeight+"px";
    document.body.appendChild(star); setTimeout(()=>star.remove(),4000);
  },220);
}

function startNotes(){
  noteInterval=setInterval(()=>{
    const n=document.createElement("div"); n.className="note"; n.innerHTML="🎵";
    n.style.left=Math.random()*window.innerWidth+"px"; n.style.top=Math.random()*window.innerHeight+"px";
    document.body.appendChild(n); setTimeout(()=>n.remove(),4000);
  },240);
}

function startBugs(){
  bugInterval=setInterval(()=>{
    const b=document.createElement("div");
    b.className=Math.random()<0.5?"bee":"butterfly";
    b.innerHTML = b.className==="bee"?"🦋":"🦋";
    b.style.left=Math.random()*window.innerWidth+"px";
    b.style.top=Math.random()*window.innerHeight+"px";
    document.body.appendChild(b); setTimeout(()=>b.remove(),4000);
  },250);
}

function flowerBurst(){
  for(let i=0;i<70;i++){
    setTimeout(()=>{
      const f=document.createElement("div"); f.className="flower"; f.innerHTML="🌸";
      const size = 30+Math.random()*40;
      f.style.fontSize = size+"px";
      f.style.left = Math.random()*window.innerWidth+"px";
      f.style.top = Math.random()*window.innerHeight+"px";
      document.body.appendChild(f); setTimeout(()=>f.remove(),2200);
    }, i*25);
  }
}

/* klik lanjut slide */
document.body.addEventListener("click",(e)=>{
  if(slideIndex>=slides.length){
    const f=document.createElement("div"); f.className="flower"; f.innerHTML="🌸";
    const size = 30+Math.random()*45;
    f.style.fontSize = size+"px"; f.style.left = e.clientX+"px"; f.style.top = e.clientY+"px";
    document.body.appendChild(f); flowers.push(f); return;
  }

  text.className = "fade-out";
  setTimeout(()=>{ slideIndex++; showSlide(slideIndex); },800);
});

/* hold clear flowers */
let holdTimer;
function clearFlowers(){
  flowers.forEach(f=>{f.style.opacity=0; setTimeout(()=>f.remove(),500)});
  flowers=[];
}
document.body.addEventListener("mousedown",()=>{ holdTimer=setTimeout(clearFlowers,800); });
document.body.addEventListener("mouseup",()=>{ clearTimeout(holdTimer); });
document.body.addEventListener("touchstart",()=>{ holdTimer=setTimeout(clearFlowers,800); });
document.body.addEventListener("touchend",()=>{ clearTimeout(holdTimer); });

showSlide(0);
</script>

</body>
</html>
